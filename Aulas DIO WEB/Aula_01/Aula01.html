<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 01 HTML</title>
</head>
<body>
    <H1>Titulo 1</H1>
    <H2>Titulo 2</H2>

        <li>Item 1</li>
        <li>Item 2</li>
        <li>Item 3</li>

        <li>Item 3</li>
    </ol>
