<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Embed vs Iframe</h1>

    <embed src="astronauta.mp4" width="500" height="300"> <!-- Embed serve para pegar algo externo e colocar no site porém não é usado para video mais por causa da acessibilidade-->

    <video controls autoplay width="500" height="300">
        <source src="astronauta.mp4" type="video/mp4">
    </video>
    
<h2>Iframe: </h2>
<!-- Iframe é mais novo e permite abrir na sua pagina o conteudo de outra pagina -->
<iframe src="http://dio.me" width="500" height="400"></iframe>
<br><br>
