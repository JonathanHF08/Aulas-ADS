<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Button</title>
</head>
<body>
    <form onsubmit="" method="get"> <!-- onsubnmit serve para validar as informações do form antes de enviar -->

        <label>Nome:</label> <input type="text" name="name"><br>
        <label>Idade:</label> <input type="number" name="idade"><br>
        <label>Password:</label> <input type="password" name="password"><br>

        <button type="button" onclick="alert('Clicado')">Clicavel</button><br>
        <button type="button" onmouseover="alert('Passei aqui')">passavel</button><br>
        <button type="submit">Enviar</button><br> <!-- envia o formulário -->
        <button type="reset" >Reset</button><br> <!-- Limpa o formulário onde está incluido -->
    </form>
</body>
</html>
